<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>冒険の書</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#f6ecd9;
    --bg-deeper:#efe0c3;
    --panel:#fffaf0;
    --panel-light:#fbf0da;
    --border-gold:#b8860b;
    --border-gold-dim:#d9c08a;
    --text-main:#3a2f1d;
    --text-dim:#8a7a5c;
    --accent-teal:#2f9e8f;
    --accent-red:#c0453a;
    --font-pixel:'Press Start 2P', monospace;
    --font-body:'Zen Maru Gothic', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg-deeper);
    font-family:var(--font-body);
    color:var(--text-main);
    -webkit-tap-highlight-color:transparent;
  }
  body{
    background:
      radial-gradient(ellipse at 50% 0%, #fbf0da 0%, var(--bg-deeper) 70%);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:16px;
    gap:14px;
  }
  .pixel-panel{
    background:var(--panel);
    border:3px solid var(--border-gold);
    border-radius:4px;
    box-shadow:0 0 0 1px var(--bg-deeper), 4px 4px 0 rgba(0,0,0,0.35);
    padding:16px;
  }
  h1.title{
    font-family:var(--font-pixel);
    font-size:15px;
    line-height:1.8;
    text-align:center;
    color:var(--border-gold);
    text-shadow:2px 2px 0 #000;
    margin:6px 0 2px;
  }
  .subtitle{
    text-align:center;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .screen{display:none;flex-direction:column;gap:14px;flex:1;}
  .screen.active{display:flex;}

  /* 名前選択 */
  #memberList{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .member-btn{
    font-family:var(--font-body);
    font-weight:700;
    font-size:15px;
    background:var(--panel-light);
    border:2px solid var(--border-gold-dim);
    color:var(--text-main);
    padding:12px 14px;
    border-radius:4px;
    text-align:left;
    cursor:pointer;
  }
  .member-btn:active{background:var(--border-gold);color:#1a1a1a;}

  /* セーブ確認 */
  .save-info{font-size:13px;color:var(--text-dim);line-height:1.7;margin-bottom:6px;}
  .btn-row{display:flex;gap:10px;}
  .btn-primary,.btn-secondary{
    flex:1;
    font-family:var(--font-pixel);
    font-size:11px;
    padding:14px 8px;
    border-radius:4px;
    cursor:pointer;
    text-align:center;
  }
  .btn-primary{background:var(--border-gold);border:2px solid #fff3d0;color:#1a1a1a;}
  .btn-secondary{background:transparent;border:2px solid var(--border-gold-dim);color:var(--text-dim);}

  /* レーダーチャート */
  #radarWrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  #radarSvg{width:100%;max-width:260px;height:auto;}
  .radar-label{font-size:10px;fill:var(--text-dim);font-family:var(--font-body);}
  .status-caption{font-size:11px;color:var(--text-dim);text-align:center;}

  /* チャット */
  #chatScreen{flex:1;}
  #chatLog{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow-y:auto;
    padding:4px 2px;
    min-height:220px;
    max-height:42vh;
  }
  .bubble{
    max-width:85%;
    padding:10px 12px;
    border-radius:10px;
    font-size:14px;
    line-height:1.6;
  }
  .bubble.ai{
    align-self:flex-start;
    background:var(--panel-light);
    border:1px solid var(--border-gold-dim);
    border-top-left-radius:2px;
  }
  .bubble.user{
    align-self:flex-end;
    background:var(--accent-teal);
    color:#0a1a1a;
    border-top-right-radius:2px;
  }
  #chatInputRow{display:flex;gap:8px;margin-top:8px;}
  #chatInput{
    flex:1;
    font-family:var(--font-body);
    font-size:14px;
    padding:10px 12px;
    border-radius:20px;
    border:2px solid var(--border-gold-dim);
    background:var(--bg-deep);
    color:var(--text-main);
  }
  #sendBtn{
    font-family:var(--font-pixel);
    font-size:11px;
    background:var(--border-gold);
    border:none;
    border-radius:20px;
    padding:0 16px;
    color:#1a1a1a;
    cursor:pointer;
  }
  .stage-toggle{
    text-align:center;
    font-size:11px;
    color:var(--accent-teal);
    text-decoration:underline;
    margin-top:6px;
    cursor:pointer;
  }
  .quest-select-row{
    display:flex;
    gap:8px;
    margin:8px 0 4px;
  }
  .quest-btn{
    flex:1;
    font-size:12px;
    font-weight:700;
    text-align:center;
    padding:10px 6px;
    border-radius:6px;
    cursor:pointer;
  }
  .quest-btn.quest-main{
    background:var(--border-gold);
    color:#1a1a1a;
    border:2px solid #8a6a1a;
  }
  .quest-btn.quest-side{
    background:transparent;
    color:var(--text-dim);
    border:2px solid var(--border-gold-dim);
  }
  .quest-btn.quest-usp{
    background:var(--accent-teal);
    color:#0a1a1a;
    border:2px solid #1f6e64;
  }
  .quest-badge{
    align-self:center;
    font-size:11px;
    color:var(--text-dim);
    background:var(--bg-deep);
    border:1px dashed var(--border-gold-dim);
    border-radius:12px;
    padding:4px 12px;
    margin:2px 0;
  }
  .quest-progress{
    font-size:11px;
    color:var(--accent-teal);
    text-align:center;
    margin-top:2px;
  }
  .save-toast{
    text-align:center;
    font-size:12px;
    color:var(--accent-teal);
    min-height:16px;
  }
  .footer-actions{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:4px;}
  .footer-actions span{cursor:pointer;text-decoration:underline;}
  .loading{text-align:center;font-size:12px;color:var(--text-dim);padding:20px 0;}
</style>
</head>
<body>
<div id="app">

  <h1 class="title">冒険の書</h1>
  <div class="subtitle">〜己を知り、仲間を知る〜</div>

  <!-- 画面0: 名前選択 -->
  <div class="screen active" id="screenName">
    <div class="pixel-panel">
      <div class="save-info">冒険者の名前を選んでください</div>
      <div id="memberList"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- 画面1: セーブ確認 -->
  <div class="screen" id="screenSave">
    <div class="pixel-panel">
      <div class="save-info" id="saveInfoText"></div>
      <div class="btn-row">
        <div class="btn-primary" id="continueBtn">つづきから</div>
        <div class="btn-secondary" id="restartBtn">はじめから</div>
      </div>
    </div>
  </div>

  <!-- 画面2: チャット + レーダー -->
  <div class="screen" id="screenChat" style="flex:1;">
    <div class="pixel-panel" id="radarWrap">
      <svg id="radarSvg" viewBox="0 0 260 240"></svg>
      <div class="status-caption" id="statusCaption">現在のステータス</div>
      <div class="quest-progress" id="questProgress"></div>
    </div>

    <div class="pixel-panel" id="chatScreen" style="display:flex;flex-direction:column;">
      <div id="chatLog"></div>
      <div class="quest-select-row" id="questSelectRow">
        <div class="quest-btn quest-main" id="questMainBtn">▶ メインストーリーを進める</div>
        <div class="quest-btn quest-side" id="questSideBtn">☆ 寄り道する(気になってること)</div>
      </div>
      <div class="quest-select-row">
        <div class="quest-btn quest-usp" id="questUspBtn" style="flex:1;">💡 自分のビジネス(USP)を整理する</div>
      </div>
      <div id="chatInputRow">
        <input id="chatInput" type="text" placeholder="思ったことを自由に…">
        <button id="sendBtn">送る</button>
      </div>
      <div class="save-toast" id="saveToast"></div>
      <div class="footer-actions">
        <span id="saveBtn">ここでセーブする</span>
        <span id="backBtn">名前選択にもどる</span>
      </div>
    </div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzfxECtQD5jmJGIcqlt6obK6JQXCa90npp7AEeP8IJIxN9HUuwcHyVofJhrdAGnKjgV/exec";
// Cloudflare Workerをデプロイしたら、そのURLに書き換えてください(例: https://adventure-book-proxy.あなたのアカウント名.workers.dev)
const WORKER_URL = "https://adventure-book-proxy.murairyota0219.workers.dev";

const AXES = ["固有スキル","オタク力","情熱","適応力","経験"];

let state = {
  name: null,
  stage: 1,
  status: {固有スキル:0,オタク力:0,情熱:0,適応力:0,経験:0},
  history: [], // {role:'user'|'model', text:'...'}
  exchangeCount: 0
};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ---- API呼び出し(中継サーバー経由) ----

// 日本語を含むJSONをBase64(URL安全版)に変換。URLエンコードより大幅に短くなる。
function toBase64Url(obj){
  const json = JSON.stringify(obj);
  const utf8Bytes = new TextEncoder().encode(json);
  let binary = '';
  utf8Bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function apiRequest(params, isRetry){
  const url = WORKER_URL + '?' + new URLSearchParams(params).toString();
  try{
    const controller = new AbortController();
    const timer = setTimeout(()=> controller.abort(), 20000);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return await res.json();
  }catch(err){
    if(!isRetry){
      return apiRequest(params, true); // 1回だけ自動再試行
    }
    throw new Error('通信に失敗しました(' + err.message + ')');
  }
}
function apiGet(params){
  return apiRequest(params);
}
function apiPost(body){
  return apiRequest({ action: body.action, payloadB64: toBase64Url(body) });
}

// ---- 初期化:名前一覧 ----
apiGet({action:'getMembers'}).then(res=>{
  const listEl = document.getElementById('memberList');
  listEl.innerHTML = '';
  if(!res.ok){ listEl.innerHTML = '<div class="save-info">名前の取得に失敗しました</div>'; return; }
  res.members.forEach(name=>{
    const btn = document.createElement('div');
    btn.className = 'member-btn';
    btn.textContent = name;
    btn.onclick = ()=>selectMember(name);
    listEl.appendChild(btn);
  });
}).catch(()=>{
  document.getElementById('memberList').innerHTML = '<div class="save-info">通信に失敗しました</div>';
});

// ---- 名前選択後:セーブ確認 ----
function selectMember(name){
  state.name = name;
  Promise.all([
    apiGet({action:'getSave', name}),
    apiGet({action:'getStatus', name})
  ]).then(([saveRes, statusRes])=>{
    if(statusRes.ok) state.status = statusRes.status;

    const stage = saveRes.ok ? Number(saveRes.save.stage) || 0 : 0;
    const summary = saveRes.ok ? (saveRes.save.summary || '') : '';
    if(saveRes.ok && stage > 0){
      document.getElementById('saveInfoText').textContent =
        name + " の冒険の書を開いた。前回はステージ " + stage + " まで進んでいる。";
      showScreen('screenSave');
      document.getElementById('continueBtn').onclick = ()=>{
        state.stage = stage;
        startChat(summary);
      };
      document.getElementById('restartBtn').onclick = ()=>{
        state.stage = 1;
        startChat('');
      };
    } else {
      state.stage = 1;
      startChat('');
    }
  });
}

// ---- チャット開始 ----
function startChat(previousSummary){
  state.history = [];
  document.getElementById('chatLog').innerHTML = '';
  drawRadar();
  showScreen('screenChat');

  if(previousSummary){
    // AIへの裏コンテキストとして要約を渡す(画面には出さない)
    state.history.push({role:'user', text:'(これまでの対話の要約:' + previousSummary + ')'});
    state.history.push({role:'model', text:'(要約を踏まえて続きを話します)'});

    const intro = "おかえりなさい、" + state.name + "さん。前回、" + previousSummary.slice(0,40) +
      (previousSummary.length>40 ? '…' : '') + " というお話をされていましたね。続きを聞かせてもらえますか。";
    addBubble('ai', intro);
    state.history.push({role:'model', text:intro});
    return;
  }

  const intro = "ようこそ、" + state.name + "さん。最近、仕事かプライベートで気になっていることはありますか。";
  addBubble('ai', intro);
  state.history.push({role:'model', text:intro});
}

// ---- レーダーチャート描画 ----
function drawRadar(){
  const svg = document.getElementById('radarSvg');
  const cx=130, cy=115, r=85;
  const n = AXES.length;
  const points = (vals)=> AXES.map((_,i)=>{
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    const rad = r * (vals[AXES[i]]/5);
    return [cx+rad*Math.cos(angle), cy+rad*Math.sin(angle)];
  });
  const gridLevels = [1,2,3,4,5];
  let svgParts = '';

  gridLevels.forEach(lv=>{
    const pts = AXES.map((_,i)=>{
      const angle = -Math.PI/2 + i*(2*Math.PI/n);
      const rad = r*(lv/5);
      return (cx+rad*Math.cos(angle))+','+(cy+rad*Math.sin(angle));
    }).join(' ');
    svgParts += `<polygon points="${pts}" fill="none" stroke="#8a7a5c33" stroke-width="1"/>`;
  });

  AXES.forEach((_,i)=>{
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
    svgParts += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#8a7a5c55" stroke-width="1"/>`;
  });

  const dataPts = points(state.status).map(p=>p.join(',')).join(' ');
  svgParts += `<polygon points="${dataPts}" fill="#4fd1c555" stroke="#4fd1c5" stroke-width="2"/>`;

  AXES.forEach((axis,i)=>{
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    const lx = cx + (r+28)*Math.cos(angle);
    const ly = cy + (r+28)*Math.sin(angle);
    svgParts += `<text x="${lx}" y="${ly}" text-anchor="middle" class="radar-label">${axis}</text>`;
  });

  svg.innerHTML = svgParts;
  document.getElementById('statusCaption').textContent =
    AXES.map(a=>a+':'+state.status[a]).join(' / ');

  const total = AXES.reduce((sum,a)=> sum + state.status[a], 0);
  const progressEl = document.getElementById('questProgress');
  progressEl.textContent = total >= 25
    ? 'メインクエスト進捗:25/25 MAX STATS ACHIEVED!'
    : 'メインクエスト進捗:' + total + '/25';
}

// ---- チャット送受信 ----
function addBubble(role, text){
  const log = document.getElementById('chatLog');
  const b = document.createElement('div');
  b.className = 'bubble ' + (role==='user' ? 'user' : 'ai');
  b.textContent = text;
  log.appendChild(b);
  log.scrollTop = log.scrollHeight;
}

document.getElementById('sendBtn').onclick = ()=>{
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  sendTurn(text, true);
};
document.getElementById('chatInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('sendBtn').click();
});

document.getElementById('questMainBtn').onclick = ()=>{
  state.stage = 2;
  addQuestBadge('▶ メインストーリーを進める');
  sendTurn('(メインストーリーを進めたい)', false);
};
document.getElementById('questSideBtn').onclick = ()=>{
  state.stage = 1;
  addQuestBadge('☆ 寄り道:今気になっていることを話したい');
  sendTurn('(今気になっていることを話したい)', false);
};
document.getElementById('questUspBtn').onclick = ()=>{
  state.stage = 3;
  addQuestBadge('💡 自分のビジネス(USP)を整理する');
  sendTurn('(USPを整理したい)', false);
};

function addQuestBadge(label){
  const log = document.getElementById('chatLog');
  const b = document.createElement('div');
  b.className = 'quest-badge';
  b.textContent = label;
  log.appendChild(b);
  log.scrollTop = log.scrollHeight;
}

function showStatusToast(prevStatus, newStatus){
  const gains = AXES.filter(a => newStatus[a] > (prevStatus[a]||0));
  const toast = document.getElementById('saveToast');
  if(gains.length === 0) return;
  toast.textContent = gains.map(a=>a+'が上がった!').join(' ');
  setTimeout(()=> toast.textContent='', 3000);
}

// 送信する履歴を短く整える(件数と文字数を抑えて安全マージンを確保)
function trimHistoryForSend(history){
  return history.slice(-8).map(h=>({
    role: h.role,
    text: h.text.length > 200 ? h.text.slice(0,200) + '…' : h.text
  }));
}

// text: 送信するメッセージ本文。showUserBubble: 通常の吹き出しとして表示するか(クエストボタン経由の時はfalse)
function sendTurn(text, showUserBubble){
  if(showUserBubble) addBubble('user', text);
  state.history.push({role:'user', text});

  apiPost({
    action:'chat',
    stage: state.stage,
    userMessage: text,
    history: trimHistoryForSend(state.history.slice(0, -1))
  }).then(res=>{
    if(!res.ok){ addBubble('ai','(エラー: ' + (res.error || '不明') + ')'); return; }
    addBubble('ai', res.reply);
    state.history.push({role:'model', text:res.reply});
    state.exchangeCount++;

    if(state.stage === 2){
      const trim = (s)=> s.length > 150 ? s.slice(0,150) + '…' : s;
      const convoText = "ユーザー: " + trim(text) + "\nAI: " + trim(res.reply);
      apiPost({action:'extractAxis', conversationText: convoText}).then(axisRes=>{
        if(axisRes.ok){
          const prevStatus = {...state.status};
          apiPost({action:'saveStatus', name: state.name, deltas: axisRes.deltas}).then(statusRes=>{
            if(statusRes.ok){
              AXES.forEach((a,i)=> state.status[a] = statusRes.status[i]);
              drawRadar();
              showStatusToast(prevStatus, state.status);
            }
          }).catch(err=> addBubble('ai','(ステータス保存エラー: '+err.message+')'));
        }
      }).catch(err=> addBubble('ai','(軸抽出エラー: '+err.message+')'));
    }

    apiPost({
      action:'saveState', name: state.name, stage: state.stage,
      summary: trimHistoryForSend(state.history.slice(-4)).map(h=>h.text).join(' / '),
      autoSave: true
    }).catch(()=>{});
  }).catch(err=>{
    addBubble('ai', '(通信失敗: ' + err.message + ')');
  });
}

document.getElementById('saveBtn').onclick = ()=>{
  apiPost({
    action:'saveState', name: state.name, stage: state.stage,
    summary: trimHistoryForSend(state.history.slice(-4)).map(h=>h.text).join(' / '),
    autoSave: false
  }).then(res=>{
    const toast = document.getElementById('saveToast');
    toast.textContent = res.ok ? '冒険の書に記録しました。' : 'セーブに失敗しました。';
    setTimeout(()=> toast.textContent='', 3000);
  });
};

document.getElementById('backBtn').onclick = ()=>{
  showScreen('screenName');
};
</script>
</body>
</html>
